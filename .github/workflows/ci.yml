name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Kotlin compiler
        run: |
          curl -sSLo kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v1.9.24/kotlin-compiler-1.9.24.zip
          unzip -q kotlin.zip -d "$HOME"
          echo "$HOME/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Compile sources
        run: |
          mapfile -t SOURCES < <(find src/main/kotlin -name '*.kt' | sort)
          kotlinc "${SOURCES[@]}" -include-runtime -d booking.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: booking-jar
          path: booking.jar
